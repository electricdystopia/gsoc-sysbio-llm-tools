services:

  # ── Neo4J ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: sysbio-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./models:/models:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      retries: 12
      start_period: 30s

  # ── COBRApy MCP ────────────────────────────────────────────────────────────
  cobrapy-mcp:
    build:
      context: ./mcp-servers/cobrapy
      dockerfile: Dockerfile
    container_name: sysbio-cobrapy
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models
    environment:
      MODELS_DIR: "/models"
    restart: unless-stopped
    healthcheck:
      # TCP socket check — works regardless of HTTP/MCP protocol details
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      retries: 6
      start_period: 15s

  # ── MEMOTE MCP ─────────────────────────────────────────────────────────────
  memote-mcp:
    build:
      context: ./mcp-servers/memote
      dockerfile: Dockerfile
    container_name: sysbio-memote
    ports:
      - "8002:8000"
    volumes:
      - ./models:/models
      - memote_reports:/reports
    environment:
      MODELS_DIR: "/models"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      retries: 6
      start_period: 15s

  # ── CarveMe MCP ────────────────────────────────────────────────────────────
  carveme-mcp:
    build:
      context: ./mcp-servers/carveme
      dockerfile: Dockerfile
    container_name: sysbio-carveme
    ports:
      - "8003:8000"
    volumes:
      - ./models:/models
      - ./genomes:/genomes
    environment:
      MODELS_DIR: "/models"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      retries: 6
      start_period: 15s

  # ── Cytoscape MCP ──────────────────────────────────────────────────────────
  cytoscape-mcp:
    build:
      context: ./mcp-servers/cytoscape
      dockerfile: Dockerfile
    container_name: sysbio-cytoscape
    ports:
      - "8004:8000"
    environment:
      CYTOSCAPE_URL: "http://host.docker.internal:1234/v1"
    restart: unless-stopped

  # ── Orchestrator ───────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: sysbio-orchestrator
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    environment:
      MODELS_DIR: "/models"
      COBRAPY_URL: "http://cobrapy-mcp:8000/mcp"
      MEMOTE_URL:  "http://memote-mcp:8000/mcp"
      CARVEME_URL: "http://carveme-mcp:8000/mcp"
    depends_on:
      cobrapy-mcp:
        condition: service_healthy
      memote-mcp:
        condition: service_healthy
      carveme-mcp:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  memote_reports: